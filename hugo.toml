title = 'tenpo kulupu pi toki pona lon ma Amelika lete'
theme = "LoveIt"

# # LoveIt
# enableRobotsTXT = true
# enableGitInfo = true
enableEmoji = true

[memu]
  [[menu.main]]
    weight = 2
    identifier = "about"
    name = "mi seme?"
    url = "/about/"
    title = "o kama sona e kulupu ni."
  [[menu.main]]
    weight = 1
    identifier = "nujo"
    name = "tenpo kulupu Nujo 2026"
    url = "/nujo2026/"

[params]
  # site default theme ["auto", "light", "dark"]
  defaultTheme = "auto"
  # public git repo url only then enableGitInfo is true
  gitRepo = ""
  # LoveIt NEW | 0.1.1 which hash function used for SRI, when empty, no SRI is used
  # ["sha256", "sha384", "sha512", "md5"]
  fingerprint = ""
  # LoveIt NEW | 0.2.0 date format
  dateFormat = "2006-01-02"
  # website title for Open Graph and Twitter Cards
  title = "tenpo kulupu pi toki pona lon ma Amelika lete"
  # website description for RSS, SEO, Open Graph and Twitter Cards
  description = "toki pona la kulupu li pali e tenpo kulupu."
  # website images for Open Graph and Twitter Cards
  images = ["/logo.png"]

[params.header.title]
  name = "tenpo kulupu"

[params.home.profile]
  title = "tenpo kulupu pi toki pona"
  subtitle = "toki pona la kulupu li pali e tenpo kulupu."

[params.analytics]
  enable = false

[params.search]
  enable = true
  type = "lunr"

[params.page.toc]
  enable = true